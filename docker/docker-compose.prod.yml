# WorldMonitor — Production environment
#
# Usage:
#   cp .env.prod.example .env.prod
#   # Edit .env.prod with your API keys
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up --build -d
#
# 从仓库根目录（推荐）:
#   bash scripts/docker-prod-deploy.sh deploy
#   （内部使用 docker/docker-compose.prod.yml 与 docker/.env.prod）
#
# After startup:
#   - App serves on http://<server-ip>:${WM_PROD_PORT:-8080}
#   - On 1panel-network OpenResty can use: proxy_pass http://guanlan-prod-app:8080;

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.fullstack
      args:
        VITE_VARIANT: ${VITE_VARIANT:-full}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org}
    ports:
      - "${WM_PROD_PORT:-8080}:8080"
    env_file: .env.prod
    environment:
      - UPSTASH_REDIS_REST_URL=http://guanlan-prod-redis-rest:80
      - UPSTASH_REDIS_REST_TOKEN=${REDIS_REST_TOKEN:-prod-token}
    depends_on:
      - redis-rest-proxy
    restart: unless-stopped
    networks:
      one-panel:
        aliases:
          - guanlan-prod-app

  redis-rest-proxy:
    build:
      context: .
      dockerfile: Dockerfile.redis-rest
    networks:
      one-panel:
        aliases:
          - guanlan-prod-redis-rest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://host.docker.internal:6379/1}
      - SRH_TOKEN=${REDIS_REST_TOKEN:-prod-token}
    restart: unless-stopped

networks:
  one-panel:
    name: 1panel-network
    external: true
