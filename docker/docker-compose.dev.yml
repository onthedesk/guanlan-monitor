# WorldMonitor — Development / Demo environment
#
# Usage:
#   cp .env.dev.example .env.dev
#   # Edit .env.dev with your API keys
#   docker compose -f docker-compose.dev.yml --env-file .env.dev up --build
#
# After startup:
#   - Vite dev server: http://<server-ip>:3000
#   - All services use external 1panel-network → OpenResty can proxy_pass to container DNS name, e.g.:
#       proxy_pass http://guanlan-dev-app:3000;
#     (stable alias; not the ephemeral container IP)

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
      args:
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org}
    volumes:
      - ..:/app
      - dev_node_modules:/app/node_modules
      - dev_blog_modules:/app/blog-site/node_modules
    ports:
      - "${WM_DEV_PORT:-3000}:3000"
    env_file: .env.dev
    environment:
      - UPSTASH_REDIS_REST_URL=http://guanlan-dev-redis-rest:80
      - UPSTASH_REDIS_REST_TOKEN=${REDIS_REST_TOKEN:-dev-token}
    depends_on:
      - redis-rest-proxy
    restart: unless-stopped
    networks:
      one-panel:
        aliases:
          - guanlan-dev-app

  redis-rest-proxy:
    build:
      context: .
      dockerfile: Dockerfile.redis-rest
    networks:
      one-panel:
        aliases:
          - guanlan-dev-redis-rest
    extra_hosts:
      # Linux: map host.docker.internal to host gateway (Redis on host / 1Panel bridge)
      - "host.docker.internal:host-gateway"
    environment:
      - REDIS_URL=${REDIS_URL:-redis://host.docker.internal:6379/0}
      - SRH_TOKEN=${REDIS_REST_TOKEN:-dev-token}
    restart: unless-stopped

networks:
  one-panel:
    name: 1panel-network
    external: true

volumes:
  dev_node_modules:
  dev_blog_modules:
